# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Temperature conversion evaluations"

prompts:
  - "Convert {{value}} degrees Celsius to Fahrenheit. Reply with only the number."
  - "What is {{value}} degrees Celsius in Fahrenheit? Give only the numeric answer."

providers:
  - "ollama:chat:llama3.2"
  - "ollama:chat:mistral"

tests:
  - vars:
      value: 0
    assert:
      - type: icontains
        value: "32"
      - type: llm-rubric
        value: "The response should be a number close to 32. No sentences."
        provider: "ollama:chat:mistral"

  - vars:
      value: 100
    assert:
      - type: icontains
        value: "212"
      - type: llm-rubric
        value: "The response should be a number close to 212. No extra text."
        provider: "ollama:chat:mistral"

  - vars:
      value: 37
    assert:
      - type: icontains
        value: "98"
      - type: llm-rubric
        value: "The response should be close to 98.6 with no surrounding sentences."
        provider: "ollama:chat:mistral"