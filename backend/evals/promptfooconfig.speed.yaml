# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Speed conversion evaluations"

prompts:
  - "Convert {{value}} km/h to mph. Reply with only the number."
  - "What is {{value}} kilometers per hour in miles per hour? Give only the numeric answer."

providers:
  - "ollama:chat:llama3.2"
  - "ollama:chat:mistral"

tests:
  - vars:
      value: 100
    assert:
      - type: icontains
        value: "62"
      - type: llm-rubric
        value: "The response should be close to 62.13. Just the number."
        provider: "ollama:chat:mistral"

  - vars:
      value: 50
    assert:
      - type: icontains
        value: "31"
      - type: llm-rubric
        value: "The response should be close to 31.07. No extra text."
        provider: "ollama:chat:mistral"

  - vars:
      value: 120
    assert:
      - type: llm-rubric
        value: "The response should be close to 74.56. No sentences."
        provider: "ollama:chat:mistral"